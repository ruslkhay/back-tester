repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.10
    hooks:
      # Run the linter to check for errors in Python code.
      - id: ruff
        args: [ --fix ]
        types_or: [ python, pyi, jupyter ]
      # Run the formatter to enforce code style.
      - id: ruff-format
        types_or: [ python, pyi, jupyter ]
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      # Remove excess output cells from Jupyter notebooks.
      - id: nbstripout
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.3
    hooks:
      # Format C++ code according to our style guide.
      - id: clang-format
exclude: 'thirdparty/.*|data/.*'
